version: "3.8"

services:
  mongodb:
    image: mongo:latest
    container_name: blast_safety_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  postgres:
    image: postgres:latest
    container_name: blast_safety_postgres
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=blast_safety
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: blast_safety_backend
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      - MONGODB_URI=mongodb://mongodb:27017/blast_safety
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/blast_safety
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - ANTHROPIC_MODEL=claude-3-5-sonnet-latest
      - ALLOWED_ORIGINS=http://localhost:3000,http://localhost:5173,http://localhost
    depends_on:
      - mongodb
      - postgres

  frontend:
    build: ./frontend
    container_name: blast_safety_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  mongo_data:
  postgres_data:
